<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>PREMIUM PREDICTOR 💖</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <style>
         :root { --premium-pink: #ff007a; --premium-gold: #ffcc00; --dark-bg: #05050a; }
         body { background: var(--dark-bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
         .premium-frame { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 122, 0.3); border-radius: 24px; box-shadow: 0 0 30px rgba(255, 0, 122, 0.1); }
         .prediction-box { background: linear-gradient(145deg, rgba(20, 20, 30, 0.9), rgba(10, 10, 15, 0.9)); border: 2px solid var(--premium-pink); border-radius: 20px; position: relative; overflow: hidden; }
         .prediction-box::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--premium-pink), transparent 30%); animation: rotate 6s linear infinite; z-index: -1; }
         @keyframes rotate { 100% { transform: rotate(360deg); } }
         .history-list-scroll { max-height: 400px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--premium-pink) transparent; }
         .history-list-scroll::-webkit-scrollbar { width: 5px; }
         .history-list-scroll::-webkit-scrollbar-thumb { background: var(--premium-pink); border-radius: 10px; }
         .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
      </style>
   </head>
   <body class="p-4 flex flex-col items-center">
      <div class="w-full max-w-md space-y-4">
         <div class="text-center py-6">
            <h1 class="text-3xl font-black tracking-tighter" style="font-family: 'Orbitron', sans-serif;">
               <span class="text-white">PREMIUM</span>
               <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-yellow-500">PREDICTOR 💖</span>
            </h1>
         </div>

         <div class="grid grid-cols-3 gap-3">
            <div class="stat-card p-3 text-center">
               <div class="text-[10px] text-gray-500">ACCURACY</div>
               <div id="accuracy" class="text-lg font-bold text-green-400">0%</div>
            </div>
            <div class="stat-card p-3 text-center">
               <div class="text-[10px] text-gray-500">ANALYSED</div>
               <div id="total-count" class="text-lg font-bold text-blue-400">0</div>
            </div>
            <div class="stat-card p-3 text-center">
               <div class="text-[10px] text-gray-500">AI STATUS</div>
               <div class="text-xs font-bold text-pink-500 animate-pulse">READY</div>
            </div>
         </div>

         <div class="prediction-box p-6 text-center">
            <div class="flex justify-between items-start mb-4">
               <span class="text-[10px] bg-pink-600 text-white px-2 py-1 rounded">CALCULATOR AI</span>
               <div class="text-right">
                  <div class="text-[9px] text-gray-400 uppercase">Next Period</div>
                  <div id="current-period" class="text-lg font-bold text-white">----</div>
               </div>
            </div>
            <div id="prediction-result" class="text-5xl font-black italic mb-2 text-white">SCANNING...</div>
            <div id="prediction-numbers" class="flex justify-center gap-2 mb-4">
               <span class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm font-bold">?</span>
               <span class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm font-bold">?</span>
            </div>
            <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
               <div id="confidence-bar" class="h-full bg-pink-500 transition-all duration-1000" style="width: 0%"></div>
            </div>
            <div class="text-[10px] text-gray-500 mt-2">Pattern Match: <span id="confidence-text">0%</span></div>
         </div>

         <div class="premium-frame flex-grow flex flex-col overflow-hidden">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/5">
               <h2 class="text-xs font-bold uppercase tracking-widest text-pink-500">Neural History (Unlimited)</h2>
               <button onclick="clearHistory()" class="text-[10px] text-red-400 uppercase">Clear</button>
            </div>
            <div id="history-list" class="history-list-scroll divide-y divide-white/5"></div>
         </div>
      </div>

      <script>
         const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
         let historyDB = JSON.parse(localStorage.getItem('premium_unlimited_db')) || [];
         let lastProcessed = null;
         let analyzedCount = 0;

         async function initApp() {
            await fetchHistoricalData(); // Pehle sara data load hoga
            setInterval(syncEngine, 3000); // Phir tracking shuru
         }

         async function fetchHistoricalData() {
            try {
               const response = await fetch(`${API_URL}?t=${Date.now()}`);
               const data = await response.json();
               const list = data.data.list;
               analyzedCount = list.length; // Jitna data mila wo count mein add
               document.getElementById('total-count').textContent = analyzedCount;
               
               runCalculatorAI(list);
               lastProcessed = list[0].issueNumber;
            } catch (e) { console.error("Initial load failed"); }
         }

         async function syncEngine() {
            try {
               const response = await fetch(`${API_URL}?t=${Date.now()}`);
               const data = await response.json();
               const list = data.data.list;
               if (list[0].issueNumber !== lastProcessed) {
                  lastProcessed = list[0].issueNumber;
                  updateHistoryWithResult(list[0]);
                  runCalculatorAI(list);
               }
            } catch (e) {}
         }

         function runCalculatorAI(list) {
            const last100 = list.map(x => ({ num: parseInt(x.number), size: parseInt(x.number) <= 4 ? 'SMALL' : 'BIG' }));
            const nextP = (BigInt(list[0].issueNumber) + 1n).toString();

            // LOGIC 1: AI CRACKER (40%) - Pattern Scanning
            let crackerVote = "BIG";
            const streak = last100.slice(0, 5);
            const isDragon = streak.every(x => x.size === streak[0].size);
            const isZigZag = streak[0].size !== streak[1].size && streak[1].size !== streak[2].size;
            if (isDragon) crackerVote = streak[0].size;
            else if (isZigZag) crackerVote = streak[0].size === 'BIG' ? 'SMALL' : 'BIG';

            // LOGIC 2: AI 2 (40%) - 9-Number & 3-Streak Logic
            let ai2Vote = "SMALL";
            if (last100[0].num === 9) ai2Vote = "SMALL"; // 9 Logic Fixed
            else if (last100[0].size === last100[1].size && last100[1].size === last100[2].size) ai2Vote = last100[0].size;
            else ai2Vote = Math.random() > 0.5 ? "BIG" : "SMALL";

            // LOGIC 3: AI 3 (20%) - Density
            const sCount = last100.slice(0, 5).filter(x => x.size === 'SMALL').length;
            const ai3Vote = sCount >= 3 ? "SMALL" : "BIG";

            // FINAL CALCULATOR AI AGGREGATION
            let sPoints = (crackerVote === 'SMALL' ? 40 : 0) + (ai2Vote === 'SMALL' ? 40 : 0) + (ai3Vote === 'SMALL' ? 20 : 0);
            let bPoints = (crackerVote === 'BIG' ? 40 : 0) + (ai2Vote === 'BIG' ? 40 : 0) + (ai3Vote === 'BIG' ? 20 : 0);
            
            const verdict = sPoints > bPoints ? "SMALL" : "BIG";
            const confidence = Math.max(sPoints, bPoints);
            const pool = verdict === "BIG" ? [5, 6, 7, 8, 9] : [0, 1, 2, 3, 4];
            const nums = pool.sort(() => .5 - Math.random()).slice(0, 2);

            updateUI(nextP, verdict, nums, confidence);
            saveLog(nextP, verdict, nums);
         }

         function updateUI(p, res, nums, conf) {
            document.getElementById('current-period').textContent = p.slice(-4);
            const resEl = document.getElementById('prediction-result');
            resEl.textContent = res;
            resEl.className = `text-5xl font-black italic mb-2 ${res === 'BIG' ? 'text-yellow-400' : 'text-pink-500'}`;
            document.getElementById('confidence-bar').style.width = conf + '%';
            document.getElementById('confidence-text').textContent = conf + '%';
            document.getElementById('prediction-numbers').innerHTML = nums.map(n => 
               `<span class="w-8 h-8 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-sm font-bold">${n}</span>`
            ).join('');
         }

         function updateHistoryWithResult(latest) {
            const actual = parseInt(latest.number) <= 4 ? 'SMALL' : 'BIG';
            historyDB.forEach(item => {
               if (item.period === latest.issueNumber && item.status === 'pending') {
                  item.status = (item.prediction === actual) ? 'WIN' : 'LOSS';
                  item.actual = latest.number;
               }
            });
            renderHistory();
         }

         function saveLog(period, prediction, numbers) {
            if (!historyDB.find(x => x.period === period)) {
               historyDB.unshift({ period, prediction, numbers, status: 'pending', actual: '?' });
               localStorage.setItem('premium_unlimited_db', JSON.stringify(historyDB));
            }
         }

         function renderHistory() {
            const listEl = document.getElementById('history-list');
            const wins = historyDB.filter(i => i.status === 'WIN').length;
            const total = historyDB.filter(i => i.status !== 'pending').length;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((wins/total)*100)+'%' : '0%';
            
            listEl.innerHTML = historyDB.map(item => `
               <div class="p-4 flex justify-between items-center ${item.status === 'WIN' ? 'bg-green-500/5' : item.status === 'LOSS' ? 'bg-red-500/5' : ''}">
                  <div>
                     <div class="text-[10px] text-gray-500">PERIOD: ${item.period.slice(-4)}</div>
                     <div class="font-bold ${item.prediction === 'BIG' ? 'text-yellow-400' : 'text-pink-500'}">${item.prediction}</div>
                  </div>
                  <div class="text-center">
                     <div class="text-[9px] text-gray-500">RESULT</div>
                     <div class="text-lg font-bold">${item.actual}</div>
                  </div>
                  <div class="text-right">
                     <div class="text-[10px] font-bold ${item.status === 'WIN' ? 'text-green-500' : item.status === 'LOSS' ? 'text-red-500' : 'text-gray-400'}">${item.status}</div>
                     <div class="text-[8px] text-gray-600">${item.numbers.join(', ')}</div>
                  </div>
               </div>
            `).join('');
         }

         function clearHistory() {
            historyDB = [];
            localStorage.removeItem('premium_unlimited_db');
            renderHistory();
         }

         initApp();
      </script>
   </body>
</html>
