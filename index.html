<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESIS AI - ADMIN PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #151515;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }
        h2 { border-bottom: 2px solid #ff4d4d; padding-bottom: 10px; letter-spacing: 2px; }
        .btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover { background: #cc0000; }
        #keyDisplay {
            margin-top: 25px;
            padding: 15px;
            background: #222;
            border: 1px dashed #555;
            font-family: monospace;
            font-size: 1.2em;
            color: #00ff00;
            word-break: break-all;
        }
        .info { font-size: 0.8em; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>GΞNΞSIS ADMIN</h2>
    <p>Generate 24-Hour Access Key</p>
    
    <button class="btn" onclick="generateKey()">GENERATE KEY</button>

    <div id="keyDisplay">--- KEY WILL APPEAR HERE ---</div>
    <p class="info">Valid for: 1 Day (24 Hours)</p>
</div>

<script>
    // Aapka Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAHJDsyzPBnirIY2CSzXJ_YQI0aPS6L-tY",
        databaseURL: "https://lzr-predictorpro-default-rtdb.firebaseio.com",
        projectId: "lzr-predictorpro",
        storageBucket: "lzr-predictorpro.firebasestorage.app"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function generateKey() {
        // Random 8 digit key banana
        const newKey = "GEN-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        
        // 24 hours (86,400,000 milliseconds) ka expiry set karna
        const expiryTimestamp = Date.now() + (24 * 60 * 60 * 1000);

        // Firebase me data save karna
        database.ref('keys/' + newKey).set({
            status: "active",
            expiresAt: expiryTimestamp,
            createdAt: new Date().toISOString()
        }).then(() => {
            document.getElementById('keyDisplay').innerText = newKey;
            alert("Key Generated & Saved to Firebase!");
        }).catch((error) => {
            console.error(error);
            alert("Error: " + error.message);
        });
    }
</script>

</body>
</html>
